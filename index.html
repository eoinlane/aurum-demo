<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum — Wealth Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="scenario.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }

    .gauge-ring {
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .rec-card { animation-fill-mode: both; }
    .rec-card:nth-child(1) { animation-delay: 0.1s; }
    .rec-card:nth-child(2) { animation-delay: 0.2s; }
    .rec-card:nth-child(3) { animation-delay: 0.3s; }
    .rec-card:nth-child(4) { animation-delay: 0.4s; }

    .gold { color: #92711A; }
    .gold-bg { background-color: #92711A; }
    .gold-border { border-color: #92711A; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen">

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg gold-bg flex items-center justify-center">
          <span class="text-white font-bold text-sm">A</span>
        </div>
        <span class="font-semibold text-slate-900 tracking-wide text-lg">AURUM</span>
        <span class="text-slate-300 text-sm hidden sm:inline">|</span>
        <span class="text-slate-400 text-sm hidden sm:inline">Wealth Intelligence Platform</span>
      </div>
      <div id="header-badge" class="text-xs font-medium px-3 py-1 rounded-full bg-gray-100 text-slate-500">
        Engine v0.2.0
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10 space-y-10">

    <!-- ── Scenario Narrative ─────────────────────────────────────── -->
    <section class="fade-in" style="animation-delay:0s">
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-xl gold-bg flex items-center justify-center flex-shrink-0 mt-0.5">
            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <div>
            <p class="text-xs font-semibold gold uppercase tracking-widest mb-2">Engagement Signal</p>
            <p id="scenario-narrative" class="text-slate-600 leading-relaxed text-base max-w-3xl"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Client Profile ─────────────────────────────────────────── -->
    <section class="fade-in" style="animation-delay:0.05s">
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6">
          <div class="flex items-center gap-5">
            <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center text-2xl font-light text-slate-400 select-none">
              SK
            </div>
            <div>
              <h1 id="client-name" class="text-2xl font-semibold text-slate-900"></h1>
              <p id="client-meta" class="text-slate-500 text-sm mt-0.5"></p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="text-right">
              <p class="text-xs text-slate-400 mb-1">Overall Wealth Score</p>
              <p id="overall-score" class="text-3xl font-bold text-slate-900"></p>
            </div>
            <div id="priority-badge" class="px-4 py-2 rounded-xl text-sm font-semibold"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Tri-State Gauges ───────────────────────────────────────── -->
    <section class="fade-in" style="animation-delay:0.1s">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Tri-State Analysis</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

        <!-- Liquidity -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 text-center">
          <svg viewBox="0 0 120 120" class="w-32 h-32 mx-auto -mb-2">
            <circle cx="60" cy="60" r="48" fill="none" stroke="#f1f5f9" stroke-width="10"/>
            <circle id="gauge-liquidity" cx="60" cy="60" r="48" fill="none"
              stroke="#3b82f6" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="301.59" stroke-dashoffset="301.59"
              transform="rotate(-90 60 60)"/>
            <text x="60" y="55" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" id="gauge-liq-val">0</text>
            <text x="60" y="72" text-anchor="middle" font-size="11" fill="#94a3b8">/100</text>
          </svg>
          <div class="mt-3">
            <p class="text-base font-semibold text-slate-900">Liquidity</p>
            <p class="text-xs text-slate-400 mt-1">Cash flow &amp; purchasing power</p>
          </div>
          <div id="liq-metrics" class="mt-4 space-y-2 text-left"></div>
        </div>

        <!-- Solvency -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 text-center">
          <svg viewBox="0 0 120 120" class="w-32 h-32 mx-auto -mb-2">
            <circle cx="60" cy="60" r="48" fill="none" stroke="#f1f5f9" stroke-width="10"/>
            <circle id="gauge-solvency" cx="60" cy="60" r="48" fill="none"
              stroke="#10b981" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="301.59" stroke-dashoffset="301.59"
              transform="rotate(-90 60 60)"/>
            <text x="60" y="55" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" id="gauge-sol-val">0</text>
            <text x="60" y="72" text-anchor="middle" font-size="11" fill="#94a3b8">/100</text>
          </svg>
          <div class="mt-3">
            <p class="text-base font-semibold text-slate-900">Solvency</p>
            <p class="text-xs text-slate-400 mt-1">Loans, mortgage &amp; credit</p>
          </div>
          <div id="sol-metrics" class="mt-4 space-y-2 text-left"></div>
        </div>

        <!-- Prosperity -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 text-center">
          <svg viewBox="0 0 120 120" class="w-32 h-32 mx-auto -mb-2">
            <circle cx="60" cy="60" r="48" fill="none" stroke="#f1f5f9" stroke-width="10"/>
            <circle id="gauge-prosperity" cx="60" cy="60" r="48" fill="none"
              stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="301.59" stroke-dashoffset="301.59"
              transform="rotate(-90 60 60)"/>
            <text x="60" y="55" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" id="gauge-pro-val">0</text>
            <text x="60" y="72" text-anchor="middle" font-size="11" fill="#94a3b8">/100</text>
          </svg>
          <div class="mt-3">
            <p class="text-base font-semibold text-slate-900">Prosperity</p>
            <p class="text-xs text-slate-400 mt-1">Investments, property &amp; pension</p>
          </div>
          <div id="pro-metrics" class="mt-4 space-y-2 text-left"></div>
        </div>
      </div>
    </section>

    <!-- ── Key Metrics ────────────────────────────────────────────── -->
    <section class="fade-in" style="animation-delay:0.15s">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Wealth Engine Metrics</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4" id="metrics-grid"></div>
    </section>

    <!-- ── Recommendations ───────────────────────────────────────── -->
    <section class="fade-in" style="animation-delay:0.2s">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Wealth Manager Recommendations</h2>
      <div class="space-y-3" id="recommendations-list"></div>
    </section>

    <!-- ── Footer ────────────────────────────────────────────────── -->
    <footer class="text-center text-xs text-slate-300 pb-8 fade-in" style="animation-delay:0.25s">
      <p id="footer-text"></p>
    </footer>

  </main>

  <script>
    const C = 2 * Math.PI * 48; // circumference for r=48

    function scoreToOffset(score) {
      return C * (1 - Math.min(100, Math.max(0, score)) / 100);
    }

    function pct(val) {
      if (val === null || val === undefined) return '—';
      return (val * 100).toFixed(1) + '%';
    }

    function euros(val) {
      if (val === null || val === undefined) return '—';
      return '€' + Number(val).toLocaleString('en-IE', { maximumFractionDigits: 0 });
    }

    function metricRow(label, value) {
      return `<div class="flex justify-between items-center text-xs border-t border-gray-50 pt-2">
        <span class="text-slate-400">${label}</span>
        <span class="font-medium text-slate-700">${value}</span>
      </div>`;
    }

    function metricTile(label, value, sub) {
      return `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
        <p class="text-xs text-slate-400 mb-2">${label}</p>
        <p class="text-2xl font-bold text-slate-900">${value}</p>
        ${sub ? `<p class="text-xs text-slate-400 mt-1">${sub}</p>` : ''}
      </div>`;
    }

    function urgencyStyles(urgency) {
      if (urgency === 'High')   return { bar: 'bg-red-500',    badge: 'bg-red-50 text-red-600 border-red-100',   dot: 'bg-red-500' };
      if (urgency === 'Medium') return { bar: 'bg-amber-400',  badge: 'bg-amber-50 text-amber-700 border-amber-100', dot: 'bg-amber-400' };
      return                          { bar: 'bg-green-400',   badge: 'bg-green-50 text-green-700 border-green-100', dot: 'bg-green-400' };
    }

    function stateColour(state) {
      if (state === 'Liquidity')   return 'text-blue-600 bg-blue-50';
      if (state === 'Solvency')    return 'text-emerald-600 bg-emerald-50';
      if (state === 'Prosperity')  return 'text-purple-600 bg-purple-50';
      return 'text-slate-600 bg-slate-50';
    }

    function priorityStyles(priority) {
      if (priority === 'High')   return 'bg-red-50 text-red-600 border border-red-100';
      if (priority === 'Medium') return 'bg-amber-50 text-amber-700 border border-amber-100';
      return 'bg-green-50 text-green-700 border border-green-100';
    }

    function render(data) {
      const { scenario, client, engagement_signal: sig, recommendations } = data;
      const m = sig.metrics || {};

      // Narrative
      document.getElementById('scenario-narrative').textContent = scenario.narrative;

      // Client
      document.getElementById('client-name').textContent = client.name;
      document.getElementById('client-meta').textContent =
        `${client.age} · ${client.occupation} · ${client.location} · ${client.life_stage_label}`;
      document.getElementById('overall-score').textContent =
        sig.overall_wealth_score.toFixed(1);

      const pb = document.getElementById('priority-badge');
      pb.textContent = sig.engagement_priority + ' Priority';
      pb.className = `px-4 py-2 rounded-xl text-sm font-semibold ${priorityStyles(sig.engagement_priority)}`;

      // Gauges — animate after brief delay
      setTimeout(() => {
        const gauges = [
          { id: 'gauge-liquidity',  val: 'gauge-liq-val',  score: sig.liquidity_score  },
          { id: 'gauge-solvency',   val: 'gauge-sol-val',  score: sig.solvency_score   },
          { id: 'gauge-prosperity', val: 'gauge-pro-val',  score: sig.prosperity_score },
        ];
        gauges.forEach(g => {
          document.getElementById(g.id).style.strokeDashoffset = scoreToOffset(g.score);
          document.getElementById(g.val).textContent = g.score.toFixed(1);
        });
      }, 300);

      // Gauge sub-metrics
      document.getElementById('liq-metrics').innerHTML =
        metricRow('Efficiency', pct(m.liquidity_efficiency)) +
        metricRow('Obligation ratio', pct(m.obligation_ratio));

      document.getElementById('sol-metrics').innerHTML =
        metricRow('Credit reliability', pct(m.credit_reliability));

      document.getElementById('pro-metrics').innerHTML =
        metricRow('Total assets', euros(m.total_assets));

      // Metrics grid
      const efficiency = m.liquidity_efficiency;
      const fcfPct = efficiency !== null ? ((1 - efficiency) * 100).toFixed(0) + '%' : '—';
      document.getElementById('metrics-grid').innerHTML =
        metricTile('Free Cash Flow Rate', fcfPct, 'of income after all costs') +
        metricTile('Obligation Ratio', pct(m.obligation_ratio), 'income locked in obligations') +
        metricTile('Credit Reliability', pct(m.credit_reliability), 'loans in good standing') +
        metricTile('Total Assets', euros(m.total_assets), 'pension + investments');

      // Recommendations
      const list = document.getElementById('recommendations-list');
      list.innerHTML = recommendations.map(r => {
        const s = urgencyStyles(r.urgency);
        const sc = stateColour(r.state);
        return `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden rec-card fade-in">
          <div class="flex items-stretch">
            <div class="w-1.5 flex-shrink-0 ${s.bar}"></div>
            <div class="p-6 flex-1">
              <div class="flex items-start justify-between gap-4 mb-3">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-xs font-semibold px-2 py-0.5 rounded-md border ${s.badge}">${r.urgency}</span>
                  <span class="text-xs font-medium px-2 py-0.5 rounded-md ${sc}">${r.state}</span>
                  <span class="text-sm font-semibold text-slate-800">${r.area}</span>
                </div>
                ${r.product_hint ? `<span class="text-xs text-slate-300 flex-shrink-0 hidden sm:block">${r.product_hint}</span>` : ''}
              </div>
              <p class="text-sm font-medium text-slate-700 mb-2">${r.suggestion}</p>
              <p class="text-xs text-slate-400 leading-relaxed">${r.reason}</p>
            </div>
          </div>
        </div>`;
      }).join('');

      // Footer
      document.getElementById('footer-text').textContent =
        `Generated by Aurum Engine v${data.engine_version} · ${data.generated_at} · eoinlane/aurum`;
    }

    // Render on load
    if (typeof SCENARIO_DATA !== 'undefined') {
      render(SCENARIO_DATA);
    } else {
      document.body.innerHTML = '<p class="p-8 text-red-500">scenario.js not found — run demo/generate_web_scenario.py first.</p>';
    }
  </script>
</body>
</html>
