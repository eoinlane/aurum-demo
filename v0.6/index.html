<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum — Wealth Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../cohort.js"></script>
  <script src="../scenario.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .client-row { transition: background 0.15s; }
    .client-row:hover { background: #fafafa; }
    .client-row.selected { background: #fffbeb; border-left: 3px solid #92711A; }
    .gold { color: #92711A; }
    .gold-bg { background-color: #92711A; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
    .prop-bar { transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }
    input[type=range] { accent-color: #92711A; cursor: pointer; }
  </style>
</head>
<body class="bg-white text-slate-900 h-screen flex flex-col overflow-hidden">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-slate-100 flex-shrink-0 z-10">
    <div class="px-5 py-3.5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg gold-bg flex items-center justify-center">
          <span class="text-white font-bold text-sm">A</span>
        </div>
        <span class="font-semibold text-slate-900 tracking-wide">AURUM</span>
        <span class="text-slate-300 text-sm hidden sm:inline">|</span>
        <span class="text-slate-400 text-sm hidden sm:inline">Wealth Intelligence Platform</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="cohort-summary" class="text-xs text-slate-400 hidden sm:block"></span>
        <div class="flex items-center gap-1 text-[11px]">
          <span class="px-2.5 py-1 rounded-full bg-[#92711A] text-white font-semibold">v0.6</span>
          <a href="../" class="px-2.5 py-1 rounded-full bg-slate-50 text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">v0.7</a>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Two-panel body ──────────────────────────────────────────────── -->
  <div class="flex flex-1 overflow-hidden">

    <!-- ── Left: Client list ─────────────────────────────────────────── -->
    <aside class="w-72 border-r border-slate-100 flex flex-col flex-shrink-0 bg-white">
      <div class="p-4 border-b border-slate-100 space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Book of Business</span>
          <span id="client-count" class="text-xs text-slate-400"></span>
        </div>
        <div class="relative">
          <svg class="absolute left-2.5 top-2.5 w-3.5 h-3.5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
          </svg>
          <input id="search" type="text" placeholder="Search clients…"
            class="w-full pl-7 pr-3 py-1.5 text-xs border border-slate-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-[#B8860B] bg-slate-50"/>
        </div>
        <div class="flex gap-1 flex-wrap">
          <button onclick="setFilter('all')"       class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="all">All</button>
          <button onclick="setFilter('seed')"      class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="seed">Seed</button>
          <button onclick="setFilter('growth')"    class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="growth">Growth</button>
          <button onclick="setFilter('expansion')" class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="expansion">Exp</button>
          <button onclick="setFilter('peak')"      class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="peak">Peak</button>
          <button onclick="setFilter('wind_down')" class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="wind_down">Wind↓</button>
          <button onclick="setFilter('retired')"   class="filter-btn text-[10px] font-medium px-1.5 py-1 rounded-md border" data-stage="retired">Ret</button>
        </div>
        <select id="sort-select" onchange="setSort(this.value)"
          class="w-full text-xs border border-slate-200 rounded-lg px-2 py-1.5 bg-slate-50 focus:outline-none focus:ring-1 focus:ring-[#B8860B]">
          <option value="priority">Sort: Priority</option>
          <option value="score_desc">Sort: Score ↓</option>
          <option value="score_asc">Sort: Score ↑</option>
          <option value="name">Sort: Name A–Z</option>
        </select>
      </div>
      <div class="flex-1 overflow-y-auto" id="client-list"></div>
    </aside>

    <!-- ── Right: Detail panel ───────────────────────────────────────── -->
    <main class="flex-1 overflow-y-auto bg-slate-50/40" id="detail-panel">
      <div class="p-6 text-slate-400 text-sm">Select a client to view their profile.</div>
    </main>
  </div>

  <script>
    // ── Constants ─────────────────────────────────────────────────────
    const STAGE_LABELS = { seed:'Seed', growth:'Growth', expansion:'Expansion', peak:'Peak', wind_down:'Wind-Down', retired:'Retired' };
    const STAGE_ORDER  = ['seed','growth','expansion','peak','wind_down','retired'];
    // Conservative real return for drawdown planner (nominal 4% ≈ real 1.5% after inflation)
    const EQUITY_RETURN  = 0.04;
    const INFLATION_RATE = 0.025;

    // ── State ─────────────────────────────────────────────────────────
    let selectedId  = null;
    let filterStage = 'all';
    let sortBy      = 'priority';
    let searchQuery = '';

    // ── Formatting helpers ────────────────────────────────────────────
    function priorityOrder(p) { return p==='High'?0:p==='Medium'?1:2; }

    function priorityStyles(p) {
      if (p==='High')   return 'bg-red-50 text-red-600 border border-red-100';
      if (p==='Medium') return 'bg-amber-50 text-amber-700 border border-amber-100';
      return 'bg-emerald-50 text-emerald-700 border border-emerald-100';
    }

    function priorityDot(p) {
      return p==='High'?'#ef4444':p==='Medium'?'#f59e0b':'#10b981';
    }

    function urgencyStyles(u) {
      if (u==='High')   return { bar:'bg-red-500',    badge:'bg-red-50 text-red-600 border-red-100' };
      if (u==='Medium') return { bar:'bg-amber-400',  badge:'bg-amber-50 text-amber-700 border-amber-100' };
      return                   { bar:'bg-emerald-400',badge:'bg-emerald-50 text-emerald-700 border-emerald-100' };
    }

    function stateColour(s) {
      if (s==='Liquidity')  return 'text-blue-600 bg-blue-50';
      if (s==='Solvency')   return 'text-emerald-600 bg-emerald-50';
      if (s==='Prosperity') return 'text-purple-600 bg-purple-50';
      return 'text-slate-600 bg-slate-50';
    }

    function euros(v) {
      if (v == null) return '—';
      const abs = Math.abs(v);
      if (abs >= 1_000_000) return (v<0?'-':'')+'€'+(abs/1_000_000).toFixed(2)+'M';
      if (abs >= 1_000)     return (v<0?'-':'')+'€'+Math.round(abs).toLocaleString('en-IE');
      return (v<0?'-':'')+'€'+Math.round(abs);
    }

    function pct(v, d=1) { return v==null?'—':(v*100).toFixed(d)+'%'; }

    function initials(name) {
      const p = name.trim().split(/\s+/);
      return p.length===1 ? p[0].slice(0,2).toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
    }

    function autoInsight(c) {
      const first = c.name.split(' ').find(w => !w.match(/^(Mr|Mrs|Ms|Dr|Prof)\.?$/i)) || c.name.split(' ')[0];
      const top = c.recommendations && c.recommendations[0];
      if (c.engagement_priority==='High') {
        return `${first} presents a high-priority engagement opportunity. The Aurum wealth engine has surfaced a ${top?top.area:'wealth building'} signal — immediate outreach recommended.`;
      }
      if (c.engagement_priority==='Medium') {
        return `${first} scores Medium priority on the wealth index. The engine flags a ${top?top.area:'portfolio review'} opportunity worth exploring in the next advisory cycle.`;
      }
      return `${first} is currently low priority on the wealth index. Monitor for changes in cash flow or asset position that may trigger a higher-urgency signal.`;
    }

    // ── Cohort benchmarks (computed once from COHORT_DATA) ────────────
    let _benchmarks = null;
    function getStageBenchmarks() {
      if (_benchmarks) return _benchmarks;
      _benchmarks = {};
      STAGE_ORDER.forEach(stage => {
        const cohort = COHORT_DATA.individuals.filter(c => c.life_stage === stage);
        _benchmarks[stage] = {};
        ['liquidity_score','solvency_score','prosperity_score','overall_wealth_score'].forEach(key => {
          const vals = cohort.map(c => c[key]).filter(v => v != null).sort((a,b)=>a-b);
          const n = vals.length;
          _benchmarks[stage][key] = {
            mean: n ? vals.reduce((a,b)=>a+b,0)/n : 50,
            q75:  n ? vals[Math.floor(n*0.75)] : 70,
          };
        });
      });
      return _benchmarks;
    }

    // ── State box: amount + proportion + cohort comparison ────────────
    function renderStateBox(cfg) {
      const { label, subtitle, score, amount, amountLabel, secondary,
              propValue, propLabel, fillColor, headerBg, textColor,
              dotBg, stage, scoreKey } = cfg;
      const propPct  = Math.min(100, Math.max(0, (propValue||0)*100)).toFixed(1);
      const b        = getStageBenchmarks()[stage]?.[scoreKey] || { mean:50, q75:75 };
      const meanPos  = b.mean.toFixed(1);
      const q75Pos   = b.q75.toFixed(1);
      const clientPos = Math.min(99.5, Math.max(0.5, score)).toFixed(1);

      return `
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex-1 min-w-0">
          <!-- Header -->
          <div class="px-4 pt-4 pb-3 ${headerBg} border-b border-slate-100/80">
            <div class="flex items-center justify-between">
              <span class="text-[10px] font-bold ${textColor} uppercase tracking-widest">${label}</span>
              <span class="text-xl font-bold text-slate-900">${score.toFixed(1)}<span class="text-xs font-normal text-slate-400">/100</span></span>
            </div>
            <p class="text-[10px] text-slate-400 mt-0.5">${subtitle}</p>
          </div>
          <!-- Amount -->
          <div class="px-4 pt-4">
            <p class="text-[10px] text-slate-400 mb-0.5">${amountLabel}</p>
            <p class="text-xl font-bold text-slate-900">${amount}</p>
            ${secondary ? `<p class="text-[11px] text-slate-400 mt-0.5">${secondary}</p>` : ''}
          </div>
          <!-- Proportion bar -->
          <div class="px-4 pt-3">
            <div class="flex items-center justify-between text-[10px] text-slate-400 mb-1">
              <span>${propLabel}</span>
              <span class="font-medium text-slate-600">${propPct}%</span>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div class="prop-bar h-full ${fillColor} rounded-full" style="width:${propPct}%"></div>
            </div>
          </div>
          <!-- Cohort comparison track -->
          <div class="px-4 pt-3 pb-4">
            <p class="text-[9px] text-slate-400 mb-1.5 uppercase tracking-wide">vs. Life-Stage Cohort (0–100)</p>
            <div class="relative h-5 rounded-full bg-slate-50 border border-slate-100 overflow-hidden">
              <!-- mean line -->
              <div class="absolute top-0 bottom-0 w-px bg-slate-300" style="left:${meanPos}%"></div>
              <!-- q75 line -->
              <div class="absolute top-0 bottom-0 w-px bg-[#B8860B]" style="left:${q75Pos}%"></div>
              <!-- client dot -->
              <div class="absolute top-1/2 -translate-y-1/2 w-3.5 h-3.5 rounded-full border-2 border-white shadow ${dotBg} -translate-x-1/2"
                   style="left:${clientPos}%"></div>
            </div>
            <div class="flex items-center gap-3 mt-1.5 text-[9px] text-slate-400">
              <span class="flex items-center gap-1"><span class="w-3 h-px bg-slate-300 inline-block"></span>Avg ${parseFloat(meanPos).toFixed(0)}</span>
              <span class="flex items-center gap-1"><span class="w-3 h-px bg-[#B8860B] inline-block"></span>Top 25% ${parseFloat(q75Pos).toFixed(0)}</span>
              <span class="ml-auto font-medium text-slate-600">You: ${parseFloat(clientPos).toFixed(0)}</span>
            </div>
          </div>
        </div>`;
    }

    // ── Life-stage trend (cohort medians) ─────────────────────────────
    function renderLifeStageTrend(currentStage) {
      const bars = STAGE_ORDER.map(stage => {
        const cohort = COHORT_DATA.individuals.filter(c => c.life_stage === stage);
        const scores = cohort.map(c => c.overall_wealth_score).sort((a,b)=>a-b);
        const median = scores.length ? scores[Math.floor(scores.length/2)] : 0;
        const isCurrent = stage === currentStage;
        const heightPct = Math.max(8, median);
        return `
          <div class="flex flex-col items-center gap-1 flex-1 min-w-0">
            <span class="text-[9px] ${isCurrent ? 'font-bold gold' : 'text-slate-400'}">${median.toFixed(0)}</span>
            <div class="w-full flex items-end justify-center" style="height:44px">
              <div class="w-full rounded-t ${isCurrent ? 'bg-[#92711A]' : 'bg-slate-200'}"
                   style="height:${heightPct}%"></div>
            </div>
            <span class="text-[9px] ${isCurrent ? 'font-semibold gold' : 'text-slate-400'} text-center leading-tight truncate w-full text-center">
              ${STAGE_LABELS[stage]}
            </span>
            ${isCurrent ? '<span class="text-[8px] gold">▲ Now</span>' : '<span class="text-[8px] text-transparent">·</span>'}
          </div>`;
      }).join('');
      return `
        <div>
          <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-3">Life-Stage Position</h3>
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
            <div class="flex gap-2 items-end">${bars}</div>
            <p class="text-[9px] text-slate-300 mt-3 text-center">Cohort median overall score per life stage · this client highlighted</p>
          </div>
        </div>`;
    }

    // ── Retirement planner ────────────────────────────────────────────
    function renderRetirementPlanner(c) {
      const m = c.metrics || {};
      const totalAssets = m.total_assets || 0;
      const annualIncome = (m.monthly_income || 0) * 12;
      const defActive  = Math.max(20000, Math.round(annualIncome * 0.65 / 5000) * 5000);
      const defPassive = Math.max(15000, Math.round(annualIncome * 0.40 / 5000) * 5000);
      const defFloor   = Math.round(totalAssets * 0.10 / 10000) * 10000;
      const maxActive  = Math.max(defActive  * 2, 150000);
      const maxPassive = Math.max(defPassive * 2, 100000);
      const maxFloor   = Math.max(defFloor   * 4, Math.round(totalAssets * 0.5 / 10000) * 10000 || 500000);
      const pid = `rp_${c.customer_id.replace(/[^a-z0-9]/gi,'')}`;
      return `
        <div>
          <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-3">Retirement Liquidation Planner</h3>
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-5">
              <div>
                <div class="flex justify-between mb-1">
                  <label class="text-[10px] text-slate-400">Active phase <span class="text-[9px] text-slate-300">(yrs 1–10)</span></label>
                  <span class="text-[10px] font-semibold text-slate-700" id="${pid}_av">${euros(defActive)}<span class="font-normal text-slate-400">/yr</span></span>
                </div>
                <input type="range" id="${pid}_a" min="5000" max="${maxActive}" step="5000"
                  value="${defActive}" oninput="plannerChange('${pid}','${c.customer_id}')"
                  class="w-full h-1.5 rounded-full appearance-none bg-slate-200">
              </div>
              <div>
                <div class="flex justify-between mb-1">
                  <label class="text-[10px] text-slate-400">Passive phase <span class="text-[9px] text-slate-300">(yrs 11–25)</span></label>
                  <span class="text-[10px] font-semibold text-slate-700" id="${pid}_pv">${euros(defPassive)}<span class="font-normal text-slate-400">/yr</span></span>
                </div>
                <input type="range" id="${pid}_p" min="5000" max="${maxPassive}" step="5000"
                  value="${defPassive}" oninput="plannerChange('${pid}','${c.customer_id}')"
                  class="w-full h-1.5 rounded-full appearance-none bg-slate-200">
              </div>
              <div>
                <div class="flex justify-between mb-1">
                  <label class="text-[10px] text-slate-400">Estate floor</label>
                  <span class="text-[10px] font-semibold text-slate-700" id="${pid}_fv">${euros(defFloor)}</span>
                </div>
                <input type="range" id="${pid}_f" min="0" max="${maxFloor}" step="10000"
                  value="${defFloor}" oninput="plannerChange('${pid}','${c.customer_id}')"
                  class="w-full h-1.5 rounded-full appearance-none bg-slate-200">
              </div>
            </div>
            <div id="${pid}_status" class="text-xs text-center mb-3 h-4 font-medium"></div>
            <canvas id="${pid}_canvas" height="130" class="w-full block"></canvas>
            <p class="text-[9px] text-slate-300 mt-2 text-center">4% nominal return · 2.5% inflation · spend inflation-adjusted annually</p>
          </div>
        </div>`;
    }

    function projectDrawdown(assets, annualActive, annualPassive, yearsActive, yearsPassive, floor) {
      let v = assets;
      const years=[], values=[], phases=[];
      let depleted=null;
      for (let yr=1; yr<=yearsActive+yearsPassive; yr++) {
        const spend = yr<=yearsActive ? annualActive : annualPassive;
        v = v * (1+EQUITY_RETURN) - spend * Math.pow(1+INFLATION_RATE, yr-1);
        if (v<=floor && depleted===null) depleted=yr;
        years.push(yr); values.push(Math.max(0,v)); phases.push(yr<=yearsActive?'active':'passive');
      }
      return { years, values, phases, depleted, final: Math.max(0,v) };
    }

    function drawPlannerCanvas(canvasId, data, totalAssets, floor, yearsActive) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const DPR = window.devicePixelRatio||1;
      const W=canvas.offsetWidth, H=canvas.height;
      canvas.width=W*DPR; canvas.height=H*DPR;
      const ctx=canvas.getContext('2d');
      ctx.scale(DPR,DPR);

      const pad={t:10,r:15,b:26,l:58};
      const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
      const n=data.years.length;
      const maxV=Math.max(totalAssets,...data.values,floor||0)*1.05;

      function xp(i){ return pad.l+(i/(n-1))*cw; }
      function yp(v){ return pad.t+ch*(1-v/maxV); }

      // Phase backgrounds
      const tx=xp(yearsActive);
      ctx.fillStyle='#f8faff'; ctx.fillRect(pad.l,pad.t,tx-pad.l,ch);
      ctx.fillStyle='#f9f7f4'; ctx.fillRect(tx,pad.t,pad.l+cw-tx,ch);

      // Phase labels
      ctx.font=`9px Inter,sans-serif`; ctx.fillStyle='#94a3b8';
      ctx.fillText('Active',pad.l+4,pad.t+10);
      ctx.fillText('Passive',tx+4,pad.t+10);

      // Horizontal grid + y labels
      [0.25,0.5,0.75,1].forEach(f => {
        const y=yp(maxV*f);
        ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
        ctx.fillStyle='#94a3b8'; ctx.font='8px Inter,sans-serif';
        ctx.textAlign='right'; ctx.fillText(euros(maxV*f),pad.l-3,y+3);
      });
      ctx.textAlign='left';

      // X axis labels
      data.years.forEach((yr,i) => {
        if(yr%5===0){ ctx.fillStyle='#94a3b8'; ctx.font='8px Inter,sans-serif';
          ctx.fillText(`yr${yr}`,xp(i)-8,pad.t+ch+16); }
      });

      // Floor line
      if(floor>0){
        ctx.setLineDash([3,3]); ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(pad.l,yp(floor)); ctx.lineTo(pad.l+cw,yp(floor)); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='#94a3b8'; ctx.font='8px Inter,sans-serif';
        ctx.fillText('floor',pad.l+2,yp(floor)-3);
      }

      // Depletion zone
      if(data.depleted!==null){
        const dx=xp(data.depleted-1);
        ctx.fillStyle='rgba(239,68,68,0.07)';
        ctx.fillRect(dx,pad.t,pad.l+cw-dx,ch);
      }

      // Drawdown curve fill
      ctx.beginPath();
      data.values.forEach((v,i) => i===0 ? ctx.moveTo(xp(i),yp(v)) : ctx.lineTo(xp(i),yp(v)));
      ctx.lineTo(xp(n-1),yp(0)); ctx.lineTo(xp(0),yp(0)); ctx.closePath();
      ctx.fillStyle='rgba(146,113,26,0.08)'; ctx.fill();

      // Drawdown curve line
      ctx.beginPath();
      data.values.forEach((v,i) => i===0 ? ctx.moveTo(xp(i),yp(v)) : ctx.lineTo(xp(i),yp(v)));
      ctx.strokeStyle='#92711A'; ctx.lineWidth=2; ctx.stroke();

      // Start point
      ctx.beginPath(); ctx.arc(xp(0),yp(totalAssets),4,0,Math.PI*2);
      ctx.fillStyle='#92711A'; ctx.fill();
    }

    function plannerChange(pid, customerId) {
      const active  = parseInt(document.getElementById(`${pid}_a`).value);
      const passive = parseInt(document.getElementById(`${pid}_p`).value);
      const floor   = parseInt(document.getElementById(`${pid}_f`).value);
      document.getElementById(`${pid}_av`).innerHTML = `${euros(active)}<span class="font-normal text-slate-400">/yr</span>`;
      document.getElementById(`${pid}_pv`).innerHTML = `${euros(passive)}<span class="font-normal text-slate-400">/yr</span>`;
      document.getElementById(`${pid}_fv`).textContent = euros(floor);
      const c = COHORT_DATA.individuals.find(x=>x.customer_id===customerId);
      if(!c) return;
      const totalAssets = (c.metrics||{}).total_assets||0;
      const data = projectDrawdown(totalAssets, active, passive, 10, 15, floor);
      const statusEl = document.getElementById(`${pid}_status`);
      if(data.depleted!==null){
        statusEl.textContent=`⚠ Assets reach estate floor in year ${data.depleted}`;
        statusEl.className='text-xs text-center mb-3 h-4 font-medium text-red-500';
      } else {
        statusEl.textContent=`Assets survive full 25-year projection — ending value ${euros(data.final)}`;
        statusEl.className='text-xs text-center mb-3 h-4 font-medium text-emerald-600';
      }
      drawPlannerCanvas(`${pid}_canvas`, data, totalAssets, floor, 10);
    }

    // ── Filter / sort ─────────────────────────────────────────────────
    function getFiltered() {
      let list = (typeof COHORT_DATA !== 'undefined') ? COHORT_DATA.individuals : [];
      if (filterStage!=='all') list=list.filter(c=>c.life_stage===filterStage);
      if (searchQuery) { const q=searchQuery.toLowerCase(); list=list.filter(c=>c.name.toLowerCase().includes(q)); }
      return [...list].sort((a,b)=>{
        if(sortBy==='priority'){ const d=priorityOrder(a.engagement_priority)-priorityOrder(b.engagement_priority); return d!==0?d:b.overall_wealth_score-a.overall_wealth_score; }
        if(sortBy==='score_desc') return b.overall_wealth_score-a.overall_wealth_score;
        if(sortBy==='score_asc')  return a.overall_wealth_score-b.overall_wealth_score;
        if(sortBy==='name')       return a.name.localeCompare(b.name);
        return 0;
      });
    }

    function renderList() {
      const list=getFiltered();
      document.getElementById('client-count').textContent=`${list.length} clients`;
      document.getElementById('sort-select').value=sortBy;
      document.getElementById('client-list').innerHTML=list.map(c=>{
        const active=c.customer_id===selectedId;
        return `<button onclick="selectClient('${c.customer_id}')"
          class="client-row w-full text-left px-4 py-3 border-b border-slate-50 ${active?'selected':''}" data-id="${c.customer_id}">
          <div class="flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 min-w-0">
              <div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${priorityDot(c.engagement_priority)}"></div>
              <span class="text-sm font-medium text-slate-900 truncate">${c.name}</span>
              ${c.featured?'<span class="text-[9px] px-1.5 py-0.5 rounded bg-[#92711A]/10 text-[#92711A] font-bold flex-shrink-0 uppercase tracking-wide">Demo</span>':''}
            </div>
            <span class="text-sm font-bold text-slate-600 flex-shrink-0">${c.overall_wealth_score.toFixed(0)}</span>
          </div>
          <div class="flex items-center gap-1.5 mt-0.5 ml-4">
            <span class="text-[11px] text-slate-400">${c.age}</span>
            <span class="text-slate-200 text-xs">·</span>
            <span class="text-[11px] text-slate-400">${STAGE_LABELS[c.life_stage]}</span>
          </div>
        </button>`;
      }).join('');
      if(typeof COHORT_DATA!=='undefined'){
        const all=COHORT_DATA.individuals;
        const h=all.filter(c=>c.engagement_priority==='High').length;
        const m=all.filter(c=>c.engagement_priority==='Medium').length;
        document.getElementById('cohort-summary').textContent=`${all.length} clients · ${h} High · ${m} Medium`;
      }
    }

    function setFilter(stage) {
      filterStage=stage;
      document.querySelectorAll('.filter-btn').forEach(b=>{
        const on=b.dataset.stage===stage;
        b.className=`filter-btn flex-1 text-[10px] font-medium px-1.5 py-1 rounded-md border transition-colors ${on?'bg-[#92711A] text-white border-[#92711A]':'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`;
      });
      renderList();
    }

    function setSort(val){ sortBy=val; renderList(); }

    document.getElementById('search').addEventListener('input', e=>{ searchQuery=e.target.value; renderList(); });

    function selectClient(id) {
      selectedId=id; renderList();
      const c=COHORT_DATA.individuals.find(c=>c.customer_id===id);
      if(c) renderDetail(c);
    }

    // ── Main detail renderer ──────────────────────────────────────────
    function renderDetail(c) {
      const m   = c.metrics||{};
      const recs= c.recommendations||[];
      const narrative = c.narrative||autoInsight(c);
      const metaLine  = [c.age, c.occupation||null, c.location||null, STAGE_LABELS[c.life_stage]].filter(Boolean).join(' · ');
      const isLate    = c.life_stage==='wind_down'||c.life_stage==='retired';

      // Proportions for each state box
      const liqProp = m.obligation_ratio||0;                                  // obligations / income
      const solProp = (m.total_monthly_debt_service!=null && m.monthly_income)
                      ? m.total_monthly_debt_service/m.monthly_income
                      : (m.obligation_ratio||0)*0.8;                          // proxy if no arrangement data
      const proProp = Math.min(1,(m.total_assets||0)/1_000_000);              // assets / €1M reference

      // Transfer signals from recommendations
      const fcfRec     = recs.find(r=>r.area==='FCF Conversion'&&r.urgency==='High');
      const pensionRec = recs.find(r=>(r.area||'').toLowerCase().includes('pension')&&r.urgency==='High');
      const solToProRec= recs.find(r=>r.area==='Debt Paydown Capacity');

      const fcfPct = m.monthly_income ? ((m.monthly_fcf||0)/m.monthly_income*100).toFixed(0) : null;

      document.getElementById('detail-panel').innerHTML = `
        <div class="p-6 space-y-6 fade-in max-w-3xl">

          <!-- ── Engagement Signal ────────────────────────────── -->
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-start gap-4">
              <div class="w-9 h-9 rounded-xl gold-bg flex items-center justify-center flex-shrink-0 mt-0.5">
                <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
              </div>
              <div>
                <p class="text-[10px] font-semibold gold uppercase tracking-widest mb-2">Engagement Signal</p>
                <p class="text-slate-600 leading-relaxed text-sm">${narrative}</p>
              </div>
            </div>
          </div>

          <!-- ── Pre-Call Briefing ─────────────────────────────── -->
          ${c.briefing ? `
          <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-sm p-6">
            <div class="flex items-start gap-4">
              <div class="w-9 h-9 rounded-xl bg-slate-700 flex items-center justify-center flex-shrink-0 mt-0.5">
                <svg class="w-4 h-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
                </svg>
              </div>
              <div>
                <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-2">Pre-Call Briefing <span class="text-slate-600 normal-case tracking-normal font-normal">· DeepSeek-R1</span></p>
                <p class="text-slate-300 leading-relaxed text-sm">${c.briefing}</p>
              </div>
            </div>
          </div>` : ''}

          <!-- ── Client Header ─────────────────────────────────── -->
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-5">
              <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-xl bg-slate-100 flex items-center justify-center text-xl font-light text-slate-400 select-none flex-shrink-0">
                  ${initials(c.name)}
                </div>
                <div>
                  <h2 class="text-xl font-semibold text-slate-900">${c.name}</h2>
                  <p class="text-slate-400 text-xs mt-0.5">${metaLine}</p>
                </div>
              </div>
              <div class="flex items-center gap-4">
                <div class="text-right">
                  <p class="text-[10px] text-slate-400 mb-1">Overall Wealth Score</p>
                  <p class="text-3xl font-bold text-slate-900">${c.overall_wealth_score.toFixed(1)}</p>
                </div>
                <span class="px-3 py-1.5 rounded-xl text-sm font-semibold ${priorityStyles(c.engagement_priority)}">${c.engagement_priority} Priority</span>
              </div>
            </div>
          </div>

          <!-- ── Tri-State Trident ──────────────────────────────── -->
          <div>
            <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-3">Tri-State Analysis</h3>

            <!-- Liquidity (top, full width) -->
            ${renderStateBox({
              label:'Liquidity', subtitle:'Cash flow & purchasing power',
              score: c.liquidity_score,
              amount: euros(m.monthly_income),
              amountLabel: 'Monthly Income',
              secondary: m.monthly_fcf!=null ? `Free Cash Flow: ${euros(m.monthly_fcf)}/mo${fcfPct?' ('+fcfPct+'% of income)':''}` : null,
              propValue: liqProp,
              propLabel: 'Obligations as % of income',
              fillColor: 'bg-blue-400', headerBg: 'bg-blue-50/40',
              textColor: 'text-blue-600', dotBg: 'bg-blue-500',
              stage: c.life_stage, scoreKey: 'liquidity_score',
            })}

            <!-- Transfer arrow row -->
            <div class="flex items-center justify-around py-2 text-[10px]">
              <div class="flex items-center gap-1.5 ${fcfRec?'text-amber-600 font-semibold':'text-slate-300'}">
                <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 13l-3 3m0 0l-3-3m3 3V8m0 13a9 9 0 110-18 9 9 0 010 18z"/>
                </svg>
                ${fcfRec ? `FCF ${euros(m.monthly_fcf)}/mo → Investment` : `FCF ${euros(m.monthly_fcf)}/mo idle`}
              </div>
              <div class="w-px h-4 bg-slate-200"></div>
              <div class="flex items-center gap-1.5 ${pensionRec?'text-purple-600 font-semibold':'text-slate-300'}">
                <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 13l-3 3m0 0l-3-3m3 3V8m0 13a9 9 0 110-18 9 9 0 010 18z"/>
                </svg>
                ${pensionRec ? `Pension shortfall ${euros(m.pension_annual_shortfall)}/yr` : `Pension gap ${euros(m.pension_gap)}`}
              </div>
            </div>

            <!-- Solvency + Prosperity (side by side) -->
            <div class="flex gap-3">
              ${renderStateBox({
                label:'Solvency', subtitle:'Loans, mortgage & credit',
                score: c.solvency_score,
                amount: m.total_outstanding_debt!=null ? euros(m.total_outstanding_debt) : '—',
                amountLabel: 'Outstanding Debt',
                secondary: m.total_monthly_debt_service!=null ? `Service: ${euros(m.total_monthly_debt_service)}/mo · Reliability ${pct(m.credit_reliability,0)}` : null,
                propValue: solProp,
                propLabel: 'Debt service as % of income',
                fillColor: 'bg-emerald-400', headerBg: 'bg-emerald-50/40',
                textColor: 'text-emerald-600', dotBg: 'bg-emerald-500',
                stage: c.life_stage, scoreKey: 'solvency_score',
              })}
              ${renderStateBox({
                label:'Prosperity', subtitle:'Investments, property & pension',
                score: c.prosperity_score,
                amount: euros(m.total_assets),
                amountLabel: 'Total Assets',
                secondary: m.prosperity_velocity!=null ? `Velocity: ${m.prosperity_velocity>=0?'+':''}${euros(m.prosperity_velocity)}/mo · Pension gap ${euros(m.pension_gap)}` : null,
                propValue: proProp,
                propLabel: 'Assets vs €1M reference',
                fillColor: 'bg-purple-400', headerBg: 'bg-purple-50/40',
                textColor: 'text-purple-600', dotBg: 'bg-purple-500',
                stage: c.life_stage, scoreKey: 'prosperity_score',
              })}
            </div>
          </div>

          <!-- ── Life-Stage Trend ───────────────────────────────── -->
          ${renderLifeStageTrend(c.life_stage)}

          <!-- ── Wealth Engine Metrics strip ──────────────────── -->
          <div>
            <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-3">Engine Metrics</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <p class="text-[11px] text-slate-400 mb-1">Free Cash Flow</p>
                <p class="text-xl font-bold text-slate-900">${euros(m.monthly_fcf)}<span class="text-xs font-normal text-slate-400">/mo</span></p>
                <p class="text-[10px] text-slate-400 mt-1">idle cost ${euros(m.idle_capital_cost_annual)}/yr</p>
              </div>
              <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <p class="text-[11px] text-slate-400 mb-1">Pension Gap</p>
                <p class="text-xl font-bold text-slate-900">${euros(m.pension_gap)}</p>
                <p class="text-[10px] text-slate-400 mt-1">${euros(m.pension_annual_shortfall)}/yr to close</p>
              </div>
              <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <p class="text-[11px] text-slate-400 mb-1">Prosperity Velocity</p>
                <p class="text-xl font-bold ${(m.prosperity_velocity||0)>=0?'text-slate-900':'text-red-500'}">${m.prosperity_velocity!=null?(m.prosperity_velocity>=0?'+':'')+euros(m.prosperity_velocity):'—'}<span class="text-xs font-normal text-slate-400">/mo</span></p>
                <p class="text-[10px] text-slate-400 mt-1">net worth growth rate</p>
              </div>
              <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
                <p class="text-[11px] text-slate-400 mb-1">Years to Retirement</p>
                <p class="text-xl font-bold text-slate-900">${m.years_to_retirement??'—'}</p>
                <p class="text-[10px] text-slate-400 mt-1">time horizon</p>
              </div>
            </div>
          </div>

          <!-- ── Recommendations ───────────────────────────────── -->
          ${recs.length>0 ? `
          <div>
            <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-3">Wealth Manager Recommendations</h3>
            <div class="space-y-3">
              ${recs.map(r=>{
                const s=urgencyStyles(r.urgency), sc=stateColour(r.state);
                return `<div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                  <div class="flex items-stretch">
                    <div class="w-1.5 flex-shrink-0 ${s.bar}"></div>
                    <div class="p-5 flex-1">
                      <div class="flex items-start justify-between gap-3 mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                          <span class="text-[11px] font-semibold px-2 py-0.5 rounded border ${s.badge}">${r.urgency}</span>
                          <span class="text-[11px] font-medium px-2 py-0.5 rounded ${sc}">${r.state}</span>
                          <span class="text-sm font-semibold text-slate-800">${r.area}</span>
                        </div>
                        ${r.product_hint?`<span class="text-[11px] text-slate-300 flex-shrink-0 hidden sm:block">${r.product_hint}</span>`:''}
                      </div>
                      <p class="text-sm text-slate-700 mb-1.5">${r.suggestion}</p>
                      <p class="text-xs text-slate-400 leading-relaxed">${r.reason}</p>
                    </div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>` : ''}

          <!-- ── Retirement Liquidation Planner ───────────────── -->
          ${isLate ? renderRetirementPlanner(c) : ''}

          <!-- Footer -->
          <p class="text-center text-xs text-slate-300 pb-2">
            Aurum Engine v${(typeof COHORT_DATA!=='undefined'?COHORT_DATA.engine_version:'0.6.0')}
            · ${(typeof COHORT_DATA!=='undefined'?COHORT_DATA.generated_at:'')}
            · eoinlane/aurum
          </p>
        </div>`;

      // Trigger retirement planner initial draw after layout
      if (isLate) {
        const pid=`rp_${c.customer_id.replace(/[^a-z0-9]/gi,'')}`;
        requestAnimationFrame(()=>setTimeout(()=>plannerChange(pid,c.customer_id),80));
      }
    }

    // ── Boot ──────────────────────────────────────────────────────────
    (function init() {
      if (typeof COHORT_DATA === 'undefined') {
        document.getElementById('detail-panel').innerHTML =
          '<p class="p-8 text-red-400 text-sm">cohort.js not found — run demo/generate_web_scenario.py first.</p>';
        return;
      }
      setFilter('all');
      const featured = COHORT_DATA.individuals.find(c=>c.featured);
      if (featured) selectClient(featured.customer_id);
    })();
  </script>
</body>
</html>
